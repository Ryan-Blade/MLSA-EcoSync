<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- PWA + Mobile viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EcoSync" />

    <title>EcoSync — Smart Energy Microgrid</title>

    <meta name="keywords" content="smart grid, energy trading, AI, P2P energy, microgrid, simulation" />

    <!-- Open Graph -->
    <meta property="og:title" content="EcoSync — Smart Energy Microgrid" />
